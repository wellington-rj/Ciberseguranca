name: CI - Testes Cypress

on:
  push:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instala dependências
        run: npm install

      - name: Roda testes Cypress
        uses: cypress-io/github-action@v6
        with:
          browser: chrome